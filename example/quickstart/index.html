<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>GossipStack — Drop-in Example</title>
</head>
<body>

  <h1>GossipStack Drop-in Example</h1>
  <p>Comment section loaded via CDN using the &lt;gossipstack-app&gt; custom element.</p>

  <gossipstack-app
    app-id="__APP_ID__"
    project-id="__PROJECT_ID__"
    page-id="example-page-1"
    toolbar="['media']"
    language="en"
    theme="light"
    sso-user=""
    sso-hash="">
  </gossipstack-app>

  <script src="https://cdn.gossipstack.com/dist/core/1.0.4/gossipstack.min.js"></script>

</body>
</html>
